name: Deploy 3D world map to GitHub Pages

# Builds the 3D archipelago viewer (web/data.json from cyclone.rzx via
# tools/extract_map.py + tools/build_web_data.py) and publishes web/ to
# GitHub Pages.
#
# Requires:
#   - Repository Settings > Pages > Build and deployment > Source set to
#     "GitHub Actions".
#   - A push to `main`, or a manual trigger via "Run workflow".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install SkoolKit
        run: pip install -r requirements.txt

      # `make webdata` chains: rzxplay.py cyclone.rzx -> build/cyclone-endgame.z80
      # -> tools/extract_map.py -> build/cyclone-map.json
      # -> tools/build_web_data.py -> web/data.json.
      - name: Build web data
        run: make webdata

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
